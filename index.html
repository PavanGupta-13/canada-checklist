
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1.5rem 0; max-width: 820px; }
.hero { margin-bottom: 2rem; }
.hero h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.hero p { font-size: 14px; color: var(--color-text-secondary); }
.progress-bar-wrap { background: var(--color-background-secondary); border-radius: 999px; height: 8px; margin: 1rem 0 0.5rem; overflow: hidden; }
.progress-bar { height: 8px; border-radius: 999px; background: #1D9E75; transition: width 0.4s; }
.progress-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: 1rem; overflow: hidden; }
.section-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
.section-header:hover { background: var(--color-background-secondary); }
.icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.section-meta { flex: 1; }
.section-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.section-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.section-badge { font-size: 12px; padding: 3px 10px; border-radius: 999px; font-weight: 500; }
.badge-done { background: #E1F5EE; color: #0F6E56; }
.badge-pending { background: #F1EFE8; color: #5F5E5A; }
.chevron { font-size: 12px; color: var(--color-text-tertiary); transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }
.section-body { border-top: 0.5px solid var(--color-border-tertiary); padding: 0 16px; display: none; }
.section-body.open { display: block; }
.item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; }
.item:last-child { border-bottom: none; }
.item:hover { opacity: 0.85; }
.checkbox { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--color-border-secondary); background: var(--color-background-primary); flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: background 0.2s, border-color 0.2s; }
.checkbox.checked { background: #1D9E75; border-color: #1D9E75; }
.checkmark { color: white; font-size: 11px; font-weight: 700; display: none; }
.checkbox.checked .checkmark { display: block; }
.item-text { flex: 1; }
.item-title { font-size: 14px; color: var(--color-text-primary); line-height: 1.4; font-weight: 500; }
.item-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.5; }
.tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-top: 5px; font-weight: 500; }
.tag-urgent { background: #FCEBEB; color: #A32D2D; }
.tag-asap { background: #FAEEDA; color: #854F0B; }
.tag-optional { background: #E6F1FB; color: #185FA5; }
.reset-btn { margin-top: 1.5rem; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; border: 0.5px solid var(--color-border-tertiary); background: transparent; padding: 6px 14px; border-radius: var(--border-radius-md); }
.reset-btn:hover { background: var(--color-background-secondary); }
</style>

<div class="wrap">
  <h2 class="sr-only">Sruthi's Canada to India return checklist — interactive tracker across immigration, finances, housing, health and more</h2>
  <div class="hero">
    <h1>Sruthi's Return to India — May 2026</h1>
    <p>Toronto → Hyderabad &nbsp;·&nbsp; Tap any item to mark it done &nbsp;·&nbsp; Tap a section header to expand</p>
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">0 of 0 tasks completed</div>
  </div>
  <div id="sections"></div>
  <button class="reset-btn" onclick="resetAll()">Reset all</button>
</div>

<script>
const sections = [
  {
    icon: "🛂",
    color: "#FAECE7",
    title: "Immigration & visa status",
    sub: "Permits, PR, study permit closure",
    items: [
      { t: "Check study permit expiry date", d: "Your study permit likely expired Aug 2025 after course completion. Verify on IRCC portal — you may currently be on implied status or post-graduation period.", tag: "urgent" },
      { t: "Cancel or close your study permit formally", d: "If your permit is expired/expiring, no formal cancellation needed — it lapses. Confirm your status on the IRCC portal and ensure no pending applications.", tag: "urgent" },
      { t: "Confirm you have no pending immigration applications", d: "Log into your IRCC account and ensure no sponsorship, PR, or extension applications are left open or unanswered.", tag: "urgent" },
      { t: "Check if you owe any reporting obligations to IRCC", d: "Ensure no pending biometric, travel history reporting, or address update requirements remain outstanding before departure.", tag: "asap" },
      { t: "Ensure your Indian passport is valid for 6+ months", d: "Indian passport must be valid well beyond your return date. Renew at the Indian Consulate in Toronto if expiring soon.", tag: "urgent" },
      { t: "Collect all Canadian visa stamps and documents", d: "Keep originals of your study permit, all visa stamps, and entry/exit records — useful for future visa applications to any country.", tag: "asap" },
    ]
  },
  {
    icon: "🎓",
    color: "#E6F1FB",
    title: "Academic & credentials",
    sub: "PGDM documents, transcripts, attestation",
    items: [
      { t: "Obtain official degree certificate / PGDM diploma", d: "If not already received, request the official certificate from your institution. Ensure it mentions 'Project Management' and has the registrar's seal.", tag: "urgent" },
      { t: "Get official transcripts (sealed)", d: "Request 2–3 sets of sealed official transcripts for Indian employers, WES equivalency, or further studies.", tag: "urgent" },
      { t: "Get WES (World Education Services) evaluation done", d: "WES is widely recognised in India for credential recognition and internationally. Apply at wes.org — allows Indian employers to assess your Canadian PGDM.", tag: "asap" },
      { t: "Download and store all course completion letters, grade reports", d: "Save digital copies in cloud storage (Google Drive / iCloud). Indian employers may ask for semester-wise mark sheets.", tag: "asap" },
      { t: "Get attestation / apostille if required", d: "Some Indian states or employers require apostille attestation on foreign degrees. Check if your future employer needs this — can be done at the Canadian government office.", tag: "optional" },
      { t: "Collect reference / recommendation letters from professors", d: "Request letters before leaving — much harder to obtain once you're back in India.", tag: "asap" },
      { t: "Download your student ID and course certificates", d: "Keep digital copies of all project completions, co-curriculars, certifications done during your PGDM.", tag: "optional" },
    ]
  },
  {
    icon: "💰",
    color: "#EAF3DE",
    title: "Banking & finances",
    sub: "Accounts, taxes, NRO/NRE, fund transfer",
    items: [
      { t: "File Canadian tax return for FY 2025 (if applicable)", d: "If you earned any income in Canada (part-time, TA/RA, stipend) you must file with CRA. Departure year return (T1) is due by April 30, 2026 — very close to your departure!", tag: "urgent" },
      { t: "Get CRA 'Notice of Assessment' before leaving", d: "This confirms you have no outstanding tax dues. Critical if you ever want to return to Canada or claim a refund.", tag: "urgent" },
      { t: "Close or convert your Canadian bank account", d: "Transfer funds to your Indian account or convert to NRE/NRO in India. Inform the bank of your departure — some banks allow NR accounts for Canadians living abroad.", tag: "urgent" },
      { t: "Transfer money to India via legal channels (FEMA compliant)", d: "Use wire transfer or services like Wise, Remitly, or bank SWIFT. Avoid carrying large cash — declare amounts over CAD 10,000 at departure.", tag: "urgent" },
      { t: "Update your residential status with your Indian bank to NRI or Resident", d: "On return, if you were an NRI during study, you may need to re-convert NRE/NRO accounts to regular resident accounts within 6 months of return.", tag: "asap" },
      { t: "Close or pause Canadian credit cards", d: "Inform card issuers of your departure. Cancel unused cards to protect credit. Request a credit score report (Equifax/TransUnion Canada) before leaving.", tag: "asap" },
      { t: "Settle all outstanding loans, subscriptions, dues in Canada", d: "Clear any Canadian student loans, app subscriptions (Netflix, gym, Spotify), lease dues, internet/phone bills.", tag: "urgent" },
      { t: "Carry a forex card or international debit for transit", d: "Keep some Canadian dollars or USD for airport expenses and layover needs.", tag: "optional" },
    ]
  },
  {
    icon: "🏠",
    color: "#FAEEDA",
    title: "Housing & lease",
    sub: "Rental exit, utilities, landlord",
    items: [
      { t: "Give proper notice to landlord per Ontario Tenancy Act", d: "Ontario law requires 60 days written notice for month-to-month leases. Calculate carefully — if leaving early May, notice should go out by early March 2026.", tag: "urgent" },
      { t: "Confirm lease break terms and any penalty", d: "If on a fixed-term lease, negotiate with landlord or find a subletter. Get any agreement in writing.", tag: "urgent" },
      { t: "Get your security deposit back", d: "Document the apartment condition with photos before vacating. Landlord must return deposit within specified time under Ontario law.", tag: "asap" },
      { t: "Cancel all utilities: hydro, gas, internet, renter's insurance", d: "Notify all providers 30 days ahead. Ensure final bills are paid and accounts closed.", tag: "asap" },
      { t: "Redirect mail or cancel subscriptions to your Canadian address", d: "Update your address on all platforms. Use Canada Post's mail-forwarding service for a short period.", tag: "asap" },
      { t: "Return keys, fobs, parking passes to landlord", d: "Keep a written confirmation of key return to protect against future disputes.", tag: "asap" },
    ]
  },
  {
    icon: "📱",
    color: "#EEEDFE",
    title: "Phone, SIM & digital accounts",
    sub: "Canadian number, subscriptions, data",
    items: [
      { t: "Port or cancel your Canadian phone number", d: "Decide whether to port to a Canadian VoIP service (for accessibility) or cancel entirely. Note: many app verifications use your phone number.", tag: "asap" },
      { t: "Update phone number on all critical accounts", d: "Update 2FA/OTP on Google, Apple ID, banking, LinkedIn, Amazon etc. before deactivating your Canadian SIM.", tag: "urgent" },
      { t: "Cancel Canadian phone plan", d: "Give the required notice (usually 30 days) to your telecom (Rogers/Bell/Telus etc.).", tag: "asap" },
      { t: "Download and backup all data from Canadian cloud plans", d: "If using iCloud, Google One, or OneDrive tied to Canadian billing, download your data before cancelling.", tag: "asap" },
      { t: "Cancel all Canadian streaming and subscription services", d: "Netflix Canada, Amazon Prime CA, Spotify, Disney+, gym apps, food delivery accounts — cancel all.", tag: "optional" },
      { t: "Backup all important files to external hard disk or cloud", d: "Photos, documents, assignments, thesis work — ensure nothing is left only on a Canadian device or local storage.", tag: "urgent" },
    ]
  },
  {
    icon: "🏥",
    color: "#FBEAF0",
    title: "Health & medical",
    sub: "OHIP, prescriptions, dental, records",
    items: [
      { t: "Get complete medical records from your Canadian doctor/clinic", d: "Request your full patient record — blood reports, prescriptions, any specialist notes. Important if continuing treatment in India.", tag: "asap" },
      { t: "Get a 90-day supply of any prescription medications", d: "Refill all prescriptions before leaving. Some Canadian medications may not be available or have different brand names in India.", tag: "urgent" },
      { t: "Cancel Ontario OHIP or provincial health insurance", d: "Inform OHIP/your province's health authority of your departure date. Avoid overpaying premiums.", tag: "asap" },
      { t: "Cancel any private health insurance or dental coverage", d: "If enrolled through your college or privately, cancel plans effective your departure date.", tag: "asap" },
      { t: "Get dental check-up and eye check before leaving", d: "Healthcare in Canada was free or cheap under your plan. Get a thorough dental cleaning, eye exam, and any pending check-ups done before leaving.", tag: "optional" },
      { t: "Carry vaccination record (yellow book / digital)", d: "Keep your Canadian vaccination records — useful for future travel and employer requirements in India.", tag: "asap" },
    ]
  },
  {
    icon: "💼",
    color: "#E1F5EE",
    title: "Job & career transition",
    sub: "LinkedIn, references, India job market",
    items: [
      { t: "Update LinkedIn with PGDM credential and Canada experience", d: "Add your degree, Toronto location, any internships or projects done during PGDM. Set your location to Hyderabad once you return.", tag: "asap" },
      { t: "Update resume with Canadian education and any work experience", d: "Format your resume for Indian job market standards. Include WES evaluation details if obtained.", tag: "asap" },
      { t: "Gather reference letters from Canadian professors / project supervisors", d: "Request before leaving — most professors respond faster when you're still a student.", tag: "urgent" },
      { t: "Research Indian job market for project management roles", d: "Explore opportunities at firms like TCS, Infosys, Deloitte, KPMG, Wipro. PMP certification post-return may add significant value.", tag: "optional" },
      { t: "Check PMP eligibility and apply if applicable", d: "Your PGDM in Project Management likely qualifies you for PMP certification. Apply through PMI.org — having a Canadian PGDM boosts your profile significantly.", tag: "optional" },
      { t: "Update your NAUKRI / LinkedIn India job preferences", d: "Set salary expectations for Indian market, update location preference to Hyderabad, and start networking with your batch.", tag: "optional" },
    ]
  },
  {
    icon: "✈️",
    color: "#F1EFE8",
    title: "Travel & logistics",
    sub: "Flights, baggage, customs, declaration",
    items: [
      { t: "Book return flight to Hyderabad (Toronto → Hyderabad)", d: "Book early for May travel — routes via Dubai (Emirates), Doha (Qatar), Abu Dhabi (Etihad) or Delhi are common. Prices spike in May.", tag: "urgent" },
      { t: "Check baggage allowance and plan what to ship vs carry", d: "2 check-in bags is standard. For heavy items (books, appliances, winter clothes) consider sea/air freight or shipping services like ShipBob or personal courier.", tag: "asap" },
      { t: "Declare currency correctly at Indian customs", d: "Carry only up to USD 3,000 (or equivalent) without declaration at Indian customs. Amounts above must be declared using the currency declaration form.", tag: "urgent" },
      { t: "Carry Indian customs duty allowances in mind", d: "Personal use items are exempt up to INR 50,000 duty-free. New electronics, gold jewellery above limits will be taxed. Declare honestly.", tag: "urgent" },
      { t: "Check if any Canadian goods attract GST/customs in India", d: "New laptops, expensive watches, or electronics purchased in Canada may attract customs duty if value is high. Keep purchase bills.", tag: "asap" },
      { t: "Update travel insurance coverage for the journey", d: "Ensure you have travel insurance for the flight, especially for flight cancellations, baggage loss.", tag: "optional" },
      { t: "Inform family of exact arrival details", d: "Share flight number, terminal, arrival time — RGIA Hyderabad T1 for domestic, T2 for international arrivals.", tag: "asap" },
    ]
  },
  {
    icon: "📋",
    color: "#FAC775",
    title: "Documents to carry (physical originals)",
    sub: "Never pack these in check-in baggage",
    items: [
      { t: "Indian passport (original)", d: "Keep on your person at all times during travel.", tag: "urgent" },
      { t: "Canadian study permit (original)", d: "Proof of legal stay in Canada — may be asked at Indian immigration or future visa applications.", tag: "urgent" },
      { t: "PGDM degree certificate and transcripts (originals)", d: "Carry at least one original set. All others can be sealed envelopes.", tag: "urgent" },
      { t: "All Canadian bank statements (past 2 years)", d: "Useful for home loan applications, visa applications in future, or proof of foreign residence.", tag: "asap" },
      { t: "Canadian tax returns and Notice of Assessment", d: "Keep printed and scanned copies — proves tax compliance during your Canadian stay.", tag: "asap" },
      { t: "Medical records and vaccination certificate", d: "Original vaccination booklet (yellow book), key medical test reports.", tag: "asap" },
      { t: "Proof of address in Canada (lease, utility bills)", d: "Helpful for future Canadian visa or immigration reference if needed.", tag: "optional" },
      { t: "PAN card, Aadhaar card (India)", d: "Essential for Indian banking, property, tax filing on return.", tag: "urgent" },
    ]
  },
  {
    icon: "🇮🇳",
    color: "#E1F5EE",
    title: "India re-settlement prep",
    sub: "Aadhaar, PAN, SIM, bank reactivation",
    items: [
      { t: "Reactivate or get a new Indian SIM card", d: "Your old SIM may be deactivated if unused for 1–2 years. Carry Aadhaar and passport for a new SIM — Hyderabad airport or local store.", tag: "urgent" },
      { t: "Reactivate Indian bank account", d: "If dormant, visit your home branch in Hyderabad with Aadhaar, PAN, and passport. Reactivation is straightforward.", tag: "asap" },
      { t: "Update Aadhaar address if changed", d: "Update address on Aadhaar if your Hyderabad address has changed — do it on the UIDAI portal within a few weeks of return.", tag: "asap" },
      { t: "File Indian income tax return (if applicable)", d: "If you had any Indian income (rental, interest, dividends) while abroad, you may owe Indian tax. Consult a CA — FEMA rules apply for NRI period.", tag: "asap" },
      { t: "Inform family about your return plans and living arrangements", d: "Arrange where you'll stay in Hyderabad, how luggage will be transported from airport, who picks you up.", tag: "asap" },
      { t: "Get Indian driving licence if expired", d: "If your Indian DL expired during your stay, renew at Hyderabad RTO after return.", tag: "optional" },
    ]

];

let state = {};

function getKey(si, ii) { return `s${si}_i${ii}`; }

function countAll() {
  let total = 0, done = 0;
  sections.forEach((s, si) => s.items.forEach((_, ii) => { total++; if (state[getKey(si,ii)]) done++; }));
  return { total, done };
}

function updateProgress() {
  const { total, done } = countAll();
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${done} of ${total} tasks completed — ${pct}% done`;
}

function updateBadge(si) {
  const s = sections[si];
  const total = s.items.length;
  const done = s.items.filter((_, ii) => state[getKey(si, ii)]).length;
  const badge = document.querySelector(`#badge-${si}`);
  if (done === total) {
    badge.textContent = 'Done ✓';
    badge.className = 'section-badge badge-done';
  } else {
    badge.textContent = `${done}/${total}`;
    badge.className = 'section-badge badge-pending';
  }
}

function toggleItem(si, ii) {
  const key = getKey(si, ii);
  state[key] = !state[key];
  const box = document.querySelector(`#cb-${si}-${ii}`);
  if (state[key]) box.classList.add('checked'); else box.classList.remove('checked');
  updateBadge(si);
  updateProgress();
}

function toggleSection(si) {
  const body = document.querySelector(`#body-${si}`);
  const chev = document.querySelector(`#chev-${si}`);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function resetAll() {
  state = {};
  document.querySelectorAll('.checkbox').forEach(el => el.classList.remove('checked'));
  sections.forEach((_, si) => updateBadge(si));
  updateProgress();
}

function tagHTML(tag) {
  if (!tag) return '';
  const map = { urgent: ['tag-urgent','Urgent'], asap: ['tag-asap','Do soon'], optional: ['tag-optional','Optional'] };
  const [cls, label] = map[tag] || ['',''];
  return `<span class="tag ${cls}">${label}</span>`;
}

function render() {
  const container = document.getElementById('sections');
  sections.forEach((s, si) => {
    const div = document.createElement('div');
    div.className = 'section';
    const itemsHTML = s.items.map((item, ii) => `
      <div class="item" onclick="toggleItem(${si},${ii})">
        <div class="checkbox" id="cb-${si}-${ii}"><span class="checkmark">✓</span></div>
        <div class="item-text">
          <div class="item-title">${item.t}</div>
          <div class="item-desc">${item.d}</div>
          ${tagHTML(item.tag)}
        </div>
      </div>`).join('');
    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si})">
        <div class="icon" style="background:${s.color}">${s.icon}</div>
        <div class="section-meta">
          <div class="section-title">${s.title}</div>
          <div class="section-sub">${s.sub}</div>
        </div>
        <span class="section-badge badge-pending" id="badge-${si}">0/${s.items.length}</span>
        <span class="chevron" id="chev-${si}">▼</span>
      </div>
      <div class="section-body" id="body-${si}">${itemsHTML}</div>`;
    container.appendChild(div);
    updateBadge(si);
  });
  updateProgress();
}

render();
</script>
